name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          6.0.x
          7.0.x
          8.0.x
          9.0.x

    - name: Install dependencies
      run: dotnet restore

    - name: Check vulnerable NuGet packages
      uses: elmahio/github-check-vulnerable-nuget-packages-action@v2
      with:
        projects: |
          src/Elmah.Io.Extensions.Logging/Elmah.Io.Extensions.Logging.csproj
          src/Elmah.Io.AspNetCore.ExtensionsLogging/Elmah.Io.AspNetCore.ExtensionsLogging.csproj

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --no-restore --verbosity normal

    - name: Pack Elmah.Io.Extensions.Logging
      run: dotnet pack --configuration Release src/Elmah.Io.Extensions.Logging/Elmah.Io.Extensions.Logging.csproj /p:Version=5.4.${{ github.run_number }}
    - name: Pack Elmah.Io.AspNetCore.ExtensionsLogging
      run: dotnet pack --configuration Release src/Elmah.Io.AspNetCore.ExtensionsLogging/Elmah.Io.AspNetCore.ExtensionsLogging.csproj /p:Version=5.4.${{ github.run_number }}

    - name: Install dotnet-validate
      run: dotnet tool install --global dotnet-validate --version 0.0.1-preview.537

    - name: Validate Elmah.Io.Extensions.Logging
      run: dotnet-validate package local src/Elmah.Io.Extensions.Logging/bin/Release/Elmah.Io.Extensions.Logging.5.4.${{ github.run_number }}.nupkg
    - name: Validate Elmah.Io.AspNetCore.ExtensionsLogging
      run: dotnet-validate package local src/Elmah.Io.AspNetCore.ExtensionsLogging/bin/Release/Elmah.Io.AspNetCore.ExtensionsLogging.5.4.${{ github.run_number }}.nupkg

    - name: Push Elmah.Io.Extensions.Logginge to nuget.org
      run: dotnet nuget push src/Elmah.Io.Extensions.Logging/bin/Release/Elmah.Io.Extensions.Logging.5.4.${{ github.run_number }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
      if: ${{ github.event_name == 'push' }}
    - name: Push Elmah.Io.AspNetCore.ExtensionsLogging to nuget.org
      run: dotnet nuget push src/Elmah.Io.AspNetCore.ExtensionsLogging/bin/Release/Elmah.Io.AspNetCore.ExtensionsLogging.5.4.${{ github.run_number }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
      if: ${{ github.event_name == 'push' }}

    - name: Refresh Bugster
      uses: elmahio/actions/refresh-bugster-repository@v1.2
      with:
        signing: ${{ secrets.BUGSTER_SIGNING_KEY }}
        url: ${{ secrets.FUNCTION_APP_URL }}
        repository: ${{ github.event.repository.name }}
      if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}